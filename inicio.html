<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Formulário Simples</title>
  <link rel="stylesheet" href="inicio.css">
</head>
<body>

  <h2>Cadastro</h2>

  <form>
    <label>Nome:</label><br>
    <input type="text" name="nome" required ><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Senha:</label><br>
    <input type="password" name="senha"><br><br>

    <label>Gênero:</label><br>
    <input type="radio" name="genero"> Masculino
    <input type="radio" name="genero"> Feminino<br><br>

    <label>Interesses:</label><br>
    <input type="checkbox"> Tecnologia
    <input type="checkbox"> Esporte
    <input type="checkbox"> Música<br><br>

    <button type="submit">Enviar</button>
  </form>
  <a href="login.html"class="botao">Já tem um login?</a>
 
</body>
</html>
